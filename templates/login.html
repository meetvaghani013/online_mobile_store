<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Online Mobile Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#667eea,#764ba2,#00c6ff,#0072ff);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-box{
width:380px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
color:white;
position:relative;
}

.login-box h2{
margin-bottom:25px;
font-weight:600;
}

.input-group{
position:relative;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px 40px 12px 15px;
border-radius:10px;
border:none;
outline:none;
font-size:14px;
}

.login-box input:focus{
box-shadow:0 0 0 2px #ffffff80;
}

/* Hide default browser password reveal icon */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
    display: none;
}

.toggle-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#333;
}

.login-box button{
width:100%;
padding:12px;
border-radius:25px;
border:none;
background:white;
color:#333;
font-weight:600;
cursor:pointer;
transition:0.3s ease;
}

.login-box button:hover{
background:#f1f1f1;
transform:translateY(-2px);
}

.register-link{
margin-top:15px;
font-size:14px;
}

.register-link a{
color:#fff;
text-decoration:underline;
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#333;
color:white;
padding:15px 25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:slideIn 0.5s ease;
}

@keyframes slideIn{
from{opacity:0; transform:translateX(100px);}
to{opacity:1; transform:translateX(0);}
}

</style>
</head>

<body>

<div class="login-box">
<h2>🔐 Login</h2>

<form method="post">

<div class="input-group">
<input type="text" name="username" placeholder="Username">
</div>

<div class="input-group">
  <input type="password" name="password" id="password" placeholder="Password">
  <span class="toggle-password" onclick="togglePassword()" id="eyeIcon">👁</span>
</div>

<button type="submit">Login</button>

<div class="register-link">
Don't have an account? <a href="/register">Create Account</a>
</div>

</form>
</div>

{% if error %}
<div class="popup" id="errorPopup">
❌ {{ error }}
</div>

<script>
setTimeout(function(){
document.getElementById("errorPopup").style.display="none";
},3000);
</script>
{% endif %}

<script>
function togglePassword(){
    var pass = document.getElementById("password");
    var eye = document.getElementById("eyeIcon");

    if(pass.type === "password"){
        pass.type = "text";
        eye.textContent = "🙈";
    } else {
        pass.type = "password";
        eye.textContent = "👁";
    }
}
</script>

</body>
</html>
