<!doctype html>
<html lang="en">
  <head>
    <title>Admin - Add Mobile Inventory</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 0;
      }

      .card {
        width: 850px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        padding: 35px;
        background: white;
        border: none;
        position: relative;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      h2 {
        text-align: center;
        font-weight: 700;
        color: #2d3436;
      }

      .section-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #764ba2;
        margin-bottom: 15px;
        border-bottom: 2px solid #f1f1f1;
        padding-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: #636e72;
      }

      .form-control,
      .form-select {
        border-radius: 10px;
        padding: 10px;
        border: 1px solid #dfe6e9;
        font-size: 0.9rem;
        max-height: 250px;
      }

      .form-control:focus {
        box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        border-color: #764ba2;
      }

      .btn-save {
        border-radius: 12px;
        padding: 14px;
        width: 100%;
        font-weight: 600;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        margin-top: 20px;
        transition: 0.3s;
      }

      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .preview-img {
        max-height: 120px;
        border-radius: 10px;
        display: none;
        margin-top: 10px;
        border: 1px solid #eee;
      }

      #toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 9999;
      }

      .toast-box {
        min-width: 280px;
        padding: 15px 20px;
        border-radius: 10px;
        background: #ff4d4d;
        color: white;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        font-weight: 600;
        animation: slideIn 0.4s ease forwards;
        transition: all 0.5s ease;
      }

      @keyframes slideIn {
        from {
          transform: translateX(110%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .toast-box.fade-out {
        opacity: 0;
        transform: translateY(-40px);
        margin-bottom: -55px;
      }

      .btn-div{
    display: flex;
    justify-content: center;
}


.btn{
  position: relative;
  padding: 10px 30px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.4s ease;
  box-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
}

.btn:hover{
  transform: scale(1.1);
  box-shadow: 0 0 40px rgba(255, 75, 43, 0.9);
}

/* Shine Effect */
.btn::before{
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: all 0.6s;
}

.btn:hover::before{
  left: 100%;
}
    </style>
  </head>

  <div>
    <div id="toast-container"></div>

    <div class="card">
        <div class="header">
      <h2>📱 New Mobile Inventory</h2>
      <div class="btn-div">
        <a href="/admin/products"><button class="btn">⬅ Back To Products</button></a>
      </div>
    </div>

      <form method="POST" enctype="multipart/form-data">
        <div class="section-title">📦 Basic & Physical Specs</div>
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <label class="form-label">Product Name</label>
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="e.g. iPhone 15 Pro"
              required
            />
          </div>
          <div class="col-md-3">
            <label class="form-label">Brand</label>
            <select name="brand" class="form-select" required>
              <option value="" selected disabled>Select Brand</option>
              <option>i-phone</option>
              <option>Samsung</option>
              <option>OnePlus</option>
              <option>Google</option>
              <option>Vivo</option>
              <option>Oppo</option>
              <option>Xiaomi</option>
              <option>Realme</option>
              <option>Motorola</option>
              <option>Nothing</option>
              <option>Infinix</option>
              <option>iQOO</option>
              <option>Lava</option>
              <option>Asus</option>
              <option>Sony</option>
              <option>Honor</option>
              <option>Huawei</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">Weight (g)</label>
            <input
              type="number"
              name="weight"
              class="form-control"
              placeholder="e.g. 187"
              required
            />
          </div>
          <div class="col-md-3">
            <label class="form-label">Color</label>
            <input
              type="text"
              name="color"
              class="form-control"
              placeholder="Titanium Blue"
              required
            />
          </div>
        </div>

        <div class="section-title">📶 Connectivity & SIM</div>
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <label class="form-label">Network Type</label>
            <select name="network" class="form-select" required>
              <option value="5G" selected>5G Network</option>
              <option value="4G">4G VOLTE</option>
              <option value="3G/2G">3G / 2G</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">SIM Type</label>
            <select name="sim_type" class="form-select" required>
              <option value="Dual SIM">Dual SIM (Nano + Nano)</option>
              <option value="Single SIM">Single SIM</option>
              <option value="eSIM">Dual SIM (Nano + eSIM)</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Display Size (Inch)</label>
            <select name="display" class="form-select" required>
              <option>6.1"</option>
              <option selected>6.7"</option>
              <option>6.8"</option>
              <option>6.9"</option>
            </select>
          </div>
        </div>

        <div class="section-title">⚙️ Performance & Storage</div>
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <label class="form-label">RAM</label>
            <select name="ram" class="form-select" required>
              <option>2GB</option>
              <option>3GB</option>
              <option>4GB</option>
              <option>6GB</option>
              <option selected>8GB</option>
              <option>12GB</option>
              <option>16GB</option>
              <option>18GB</option>
              <option>24GB</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Storage</label>
            <select name="storage" class="form-select" required>
              <option>32GB</option>
              <option>64GB</option>
              <option selected>128GB</option>
              <option>256GB</option>
              <option>512GB</option>
              <option>1TB</option>
              <option>2TB</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Battery</label>
            <select name="battery" class="form-select" required>
              <option>3000mAh</option>
              <option>3500mAh</option>
              <option>4000mAh</option>
              <option>4500mAh</option>
              <option selected>5000mAh</option>
              <option>5500mAh</option>
              <option>6000mAh</option>
              <option>6500mAh</option>
              <option>7000mAh</option>
            </select>
          </div>
        </div>

        <div class="section-title">📸 Camera Specifications</div>
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label">Rear (Back) Camera</label>
            <select name="back_camera" class="form-select" required>
              <option>8MP</option>
              <option>12MP</option>
              <option>16MP</option>
              <option>24MP</option>
              <option>48MP</option>
              <option selected>50MP</option>
              <option>64MP</option>
              <option>108MP</option>
              <option>200MP</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Front (Selfie) Camera</label>
            <select name="front_camera" class="form-select" required>
              <option>5MP</option>
              <option>8MP</option>
              <option>12MP</option>
              <option selected>16MP</option>
              <option>20MP</option>
              <option>32MP</option>
              <option>44MP</option>
              <option>50MP</option>
            </select>
          </div>
        </div>

        <div class="section-title">💰 Price & Description</div>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Price (₹)</label>
            <input
              type="number"
              name="price"
              class="form-control"
              placeholder="Price"
              required
            />
          </div>
          <div class="col-md-4">
            <label class="form-label">Processor</label>
            <select name="processor" class="form-select" required>
              <option value="" disabled selected>Select Processor</option>

              <optgroup label="Apple">
                <option>A15 Bionic</option>
                <option>A16 Bionic</option>
                <option>A17 Pro</option>
              </optgroup>

              <optgroup label="Qualcomm Snapdragon">
                <option>Snapdragon 695</option>
                <option>Snapdragon 778G</option>
                <option>Snapdragon 7 Gen 1</option>
                <option>Snapdragon 8 Gen 1</option>
                <option>Snapdragon 8+ Gen 1</option>
                <option>Snapdragon 8 Gen 2</option>
                <option>Snapdragon 8 Gen 3</option>
              </optgroup>

              <optgroup label="MediaTek">
                <option>Dimensity 810</option>
                <option>Dimensity 920</option>
                <option>Dimensity 1200</option>
                <option>Dimensity 8200</option>
                <option>Dimensity 9000</option>
                <option>Dimensity 9300</option>
              </optgroup>

              <optgroup label="Samsung Exynos">
                <option>Exynos 1280</option>
                <option>Exynos 1380</option>
                <option>Exynos 2200</option>
              </optgroup>

              <optgroup label="Google">
                <option>Tensor G2</option>
                <option>Tensor G3</option>
              </optgroup>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Stock Quantity</label>
            <input
              type="number"
              name="quantity"
              class="form-control"
              value="10"
              required
            />
          </div>
          <div class="col-md-4">
            <label class="form-label">Upload Image</label>
            <input
              type="file"
              name="image"
              class="form-control"
              accept="image/*"
              onchange="previewImage(event)"
              required
            />
          </div>
          <div class="col-md-12">
            <label class="form-label">About Product / Highlights</label>
            <textarea
              name="about"
              class="form-control"
              rows="3"
              placeholder="Explain special features like: Fast Charging, Water Resistant, Processor name etc."
              required
            ></textarea>
          </div>
          <div class="col-md-12 mt-3 text-center">
            <img id="imagePreview" class="preview-img mx-auto" />
          </div>
        </div>

        <button type="submit" class="btn-save">💾 Add Product to Store</button>
    </form>
</div>


    <script>
      function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
          const output = document.getElementById("imagePreview");
          output.src = reader.result;
          output.style.display = "block";
        };
        reader.readAsDataURL(event.target.files[0]);
      }

      // Upward Shifting Toast Function
      function showError(message) {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = "toast-box";
        toast.innerHTML = `<span style="margin-right:12px">⚠️</span> ${message}`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.add("fade-out");
          setTimeout(() => {
            toast.remove();
          }, 500);
        }, 4000);
      }
    </script>
  </body>
</html>
