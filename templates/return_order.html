<!doctype html>
<html>
<head>
  <title>Return Order</title>
  <style>
    /* Reset & base */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
    body {
      background: #f5f6fa;
      padding: 40px;
      color: #2f3640;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      font-weight: 600;
      color: #2f3640;
    }

    /* Card */
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 35px;
      max-width: 700px;
      margin: 0 auto 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    p, h4 {
      margin-bottom: 15px;
    }

    h4 {
      font-size: 20px;
      font-weight: 600;
      margin-top: 20px;
      color: #2f3640;
    }

    hr {
      border: 0.5px solid #dcdde1;
      margin: 15px 0;
    }

    /* Items */
    .item {
      background: #f1f2f6;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      transition: 0.2s ease;
    }

    .item:hover {
      background: #e4e6eb;
    }

    .item b { font-size: 15px; }
    .item p { font-size: 14px; margin: 4px 0; }

    /* Inputs */
    select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #dcdde1;
      margin-bottom: 20px;
      font-size: 14px;
      color: #2f3640;
      background: #fff;
      transition: 0.3s;
    }

    textarea {
      width: 100%;
      max-height: 200px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #dcdde1;
      margin-bottom: 20px;
      font-size: 14px;
      color: #2f3640;
      background: #fff;
      transition: 0.3s;
    }

    select:focus, textarea:focus {
      outline: none;
      border-color: #718093;
      box-shadow: 0 0 5px rgba(113,136,147,0.3);
    }

    textarea { min-height: 90px; resize: vertical; }

    /* Buttons */
    .btn-submit {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background-color: #273c75;
      transition: 0.3s ease;
    }

    .btn-submit:hover {
      background-color: #40739e;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

  </style>
</head>

<body>
  <h2>↩️ Return Order</h2>

  <div class="card">
    <p><b>Tracking ID:</b> {{ order.tracking_id }}</p>
    <p><b>Delivered Date:</b> {{ order.delivered_date }}</p>

    <h4>Products:</h4>

    {% for item in order.order_items %}
    <div class="item">
      <p><b>{{ item.product_brand }} {{ item.product_name }}</b></p>
      <p>Price: ₹{{ item.price }}</p>
      <p>Qty: {{ item.qty }}</p>
    </div>
    {% endfor %}

    <form method="POST" action="{{ url_for('return_order', order_id=order.id) }}">
      <select name="reason" required>
        <option value="">Select Reason</option>
        <option>Damaged product</option>
        <option>Wrong item delivered</option>
        <option>Quality not good</option>
        <option>Other</option>
      </select>

      <textarea name="extra_reason" placeholder="Explain issue (optional)" required></textarea>

      <button type="submit" class="btn-submit">Submit Return Request</button>
    </form>
  </div>
</body>
</html>
