<!doctype html>
<html>
  <head>
    <title>Change Password</title>

    <style>
      :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --glass-bg: rgba(255, 255, 255, 0.95);
        --accent-color: #764ba2;
        --text-main: #2d3436;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--primary-gradient);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: var(--glass-bg);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        transition: transform 0.3s ease;
        position: relative;
      }

      h2 {
        margin: 0 0 10px 0;
        color: var(--text-main);
        font-weight: 800;
        font-size: 1.8rem;
        text-align: center;
      }

      .username {
        text-align: center;
        font-size: 0.9rem;
        color: #636e72;
        margin-bottom: 25px;
      }

      .username strong {
        color: var(--accent-color);
      }

      .msg {
        text-align: center;
        min-height: 20px;
        margin-bottom: 15px;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .form-group {
        position: relative;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 15px 20px;
        border: 2px solid #edf2f7;
        border-radius: 12px;
        outline: none;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s ease;
        background: #f8fafc;
      }

      /* Hide default browser password reveal icon */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none;
      }

      input:focus {
        border-color: var(--accent-color);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
      }

      .toggle-btn {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #a0aec0;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        cursor: pointer;
        letter-spacing: 0.5px;
      }

      .toggle-btn:hover {
        color: var(--accent-color);
      }

      .main-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        background: var(--primary-gradient);
        color: white;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .main-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(118, 75, 162, 0.4);
      }

      .main-btn:active {
        transform: translateY(0);
      }

      /* Toast Notification Container */
      #toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
      }

      .toast {
        min-width: 250px;
        padding: 16px 24px;
        margin-bottom: 10px;
        border-radius: 12px;
        background: white;
        color: var(--text-main);
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        display: flex;
        align-items: center;
        font-weight: 600;
        font-size: 0.9rem;
        border-left: 6px solid #ccc;
        animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .toast.success {
        border-left-color: #28a745;
        background-color: #28a745;
      }
      .toast.error {
        border-left-color: #ff4d4d;
        background-color: #ff4d4d;
      }

      @keyframes slideIn {
        from {
          transform: translateX(120%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .toast.fade-out {
        animation: fadeOut 0.5s forwards;
      }

      @keyframes fadeOut {
        to {
          transform: translateX(20px);
          opacity: 0;
        }
      }

      /* 🔙 Back Button */
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 8px 16px;
  border-radius: 10px;
  border: none;
  background: #f1f3f5;
  color: #2d3436;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.back-btn:hover {
  background: var(--accent-color);
  color: white;
}
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Change Password</h2>
      <button class="back-btn" onclick="window.location.href='/dashboard'">
  ← Back
</button>

      <div class="username">Logged in as: <strong>{{ username }}</strong></div>

      <div id="message" class="msg"></div>

      <form id="passwordForm">
        <div class="form-group">
          <input
            type="password"
            id="oldPass"
            name="old_password"
            placeholder="Old Password"
            required
          />
          <button
            type="button"
            class="toggle-btn"
            onclick="togglePass('oldPass', this)"
          >
            Show
          </button>
        </div>

        <div class="form-group">
          <input
            type="password"
            id="newPass"
            name="new_password"
            placeholder="New Password"
            required
          />
          <button
            type="button"
            class="toggle-btn"
            onclick="togglePass('newPass', this)"
          >
            Show
          </button>
        </div>

        <div class="form-group">
          <input
            type="password"
            id="confirmPass"
            name="confirm_password"
            placeholder="Confirm Password"
            required
          />
          <button
            type="button"
            class="toggle-btn"
            onclick="togglePass('confirmPass', this)"
          >
            Show
          </button>
        </div>

        <button type="button" class="main-btn" onclick="updatePassword()">
          Update Password
        </button>
      </form>
    </div>

    <div id="toast-container"></div>

    <script>
      function togglePass(id, btn) {
        let input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          btn.innerText = "Hide";
        } else {
          input.type = "password";
          btn.innerText = "Show";
        }
      }

      function showToast(message, type = "error") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");

        toast.className = `toast ${type}`;
        toast.innerText = message;

        container.appendChild(toast);

        // Auto-remove after 4 seconds
        setTimeout(() => {
          toast.classList.add("fade-out");
          setTimeout(() => toast.remove(), 500);
        }, 4000);
      }

      function updatePassword() {
        let btn = document.querySelector(".main-btn");
        let oldText = btn.innerText;

        // Basic client-side check
        let newPass = document.getElementById("newPass").value;
        let confirmPass = document.getElementById("confirmPass").value;

        if (newPass !== confirmPass) {
          showToast("New passwords do not match!", "error");
          return;
        }

        btn.innerText = "Updating...";
        btn.disabled = true;

        let form = document.getElementById("passwordForm");
        let formData = new FormData(form);

        fetch("/change-password", {
          method: "POST",
          body: formData,
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              showToast(data.message, "success");
              setTimeout(() => {
                window.location.href = "/dashboard";
              }, 2000);
            } else {
              showToast(data.message, "error");
              btn.innerText = oldText;
              btn.disabled = false;
            }
          })
          .catch(() => {
            showToast("Server Error. Please try again.", "error");
            btn.innerText = oldText;
            btn.disabled = false;
          });
      }
    </script>
  </body>
</html>
